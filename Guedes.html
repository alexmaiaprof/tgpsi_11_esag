<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documento HTML</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
        }
        /* Botão XPTO */
        
        .xpto-btn {
            display: inline-block;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #6a5cff, #00d4ff);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        /* efeito brilho */
        
        .xpto-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient( 120deg, transparent, rgba(255, 255, 255, 0.6), transparent);
            transition: 0.6s;
        }
        
        .xpto-btn:hover::before {
            left: 100%;
        }
        /* hover */
        
        .xpto-btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }
        /* clique */
        
        .xpto-btn:active {
            transform: scale(0.95);
        }
    </style>

</head>

<body>
    <p><b>Guedes 5013</b></p>
    <p>11ºL</p>
    <p>Nº2</p>

    <br><br>

    <a href="index.html" class="xpto-btn">Home</a>

</body>

</html>
