<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>STCP - Linhas e Tempo Real</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #e6f0f8 0%, #f5f5f5 100%);
            color: #111;
        }
        
        .topbar {
            background: #0a5ea8;
            color: white;
            overflow: hidden;
            white-space: nowrap;
            height: 36px;
            display: flex;
            align-items: center;
            padding-left: 10px;
            font-weight: 500;
        }
        
        .scroll-wrapper {
            display: inline-flex;
            white-space: nowrap;
            animation: scroll 45s linear infinite;
        }
        
        .scroll-wrapper:hover {
            animation-play-state: paused;
        }
        
        .scroll-text {
            padding: 0 40px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }
        
        .scroll-text::before {
            content: "⚠️";
            margin-right: 6px;
        }
        
        @keyframes scroll {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(-50%);
            }
        }
        
        .header {
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            border-bottom: 1px solid #ddd;
        }
        
        .logo {
            height: 50px;
        }
        
        .titulo-rede {
            font-size: 20px;
            font-weight: 600;
            color: #0a5ea8;
        }
        
        .container {
            padding: 25px 30px;
            max-width: 1200px;
            margin: auto;
        }
        
        h1 {
            color: #0a5ea8;
            font-size: 2.6rem;
            margin-bottom: 20px;
        }
        
        h2 {
            margin-top: 40px;
            margin-bottom: 15px;
            color: #0a5ea8;
            font-size: 1.6rem;
        }
        
        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin-bottom: 25px;
        }
        
        .search-wrapper input {
            width: 100%;
            padding: 10px 40px 10px 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        
        .search-wrapper::after {
            content: "🔍";
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .linha {
            background: white;
            padding: 18px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            position: relative;
        }
        
        .linha:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
        }
        
        .codigo {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        
        .codigo.diurna {
            background: #ffd100;
            color: #111;
        }
        
        .codigo.madrugada {
            background: #111;
            color: white;
        }
        
        .desc {
            font-size: 14px;
            line-height: 1.5;
        }
        
        .tipo {
            font-size: 12px;
            margin-top: 8px;
            color: #666;
        }
        
        .highlight {
            background-color: #fff176;
            border-radius: 2px;
        }
        
        .tooltip {
            visibility: hidden;
            background-color: #0a5ea8;
            color: #fff;
            text-align: left;
            padding: 10px;
            border-radius: 6px;
            position: absolute;
            z-index: 10;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            width: max-content;
            max-width: 220px;
            font-size: 0.85rem;
            line-height: 1.3;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
        }
        
        .linha:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }
        
        #map {
            height: 400px;
            margin-top: 30px;
            border-radius: 12px;
        }
        
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .titulo-rede {
                margin-top: 10px;
            }
            h1 {
                font-size: 2rem;
            }
            .search-wrapper {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <!-- Barra azul scroll -->
    <div class="topbar">
        <div class="scroll-wrapper" id="alerts-wrapper">
            <div class="scroll-text" id="alerts"></div>
            <div class="scroll-text" id="alerts-duplicate"></div>
        </div>
    </div>

    <!-- Header -->
    <div class="header">
        <img src="https://stcp.pt/uploads/logo.svg" class="logo" alt="STCP Logo" />
        <div class="titulo-rede">REDE STCP Matosinhos</div>
    </div>

    <div class="container">
        <h1>Linhas</h1>
        <div class="search-wrapper">
            <input class="search" placeholder="Pesquisar a linha" onkeyup="filtrar()" />
        </div>

        <h2>Diurnas</h2>
        <div class="grid" id="diurnas"></div>

        <h2>Madrugada</h2>
        <div class="grid" id="madrugada"></div>

        <h2>Mapa em Tempo Real</h2>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let linhas = [{
            codigo: "500",
            desc: "Praça da Liberdade → Matosinhos (Mercado)",
            tipo: "diurna",
            paragens: "Praça da Liberdade, Porto, Matosinhos, Mercado"
        }, {
            codigo: "501",
            desc: "Aliados → Matosinhos (Praia)",
            tipo: "diurna",
            paragens: "Aliados, Porto, Matosinhos, Praia"
        }, {
            codigo: "502",
            desc: "Bolhão → Matosinhos (Mercado)",
            tipo: "diurna",
            paragens: "Bolhão, Porto, Matosinhos, Mercado"
        }, {
            codigo: "503",
            desc: "Boavista → Gatões",
            tipo: "diurna",
            paragens: "Boavista, Porto, Gatões"
        }, {
            codigo: "504",
            desc: "Boavista → NorteShopping (via Fluvial)",
            tipo: "diurna",
            paragens: "Boavista, NorteShopping, Fluvial"
        }, {
            codigo: "505",
            desc: "Hospital S. João → Matosinhos (Mercado) (via Custóias)",
            tipo: "diurna",
            paragens: "Hospital S. João, Custóias, Matosinhos, Mercado"
        }, {
            codigo: "506",
            desc: "Hospital S. João → Matosinhos (Mercado) (via Padrão da Légua)",
            tipo: "diurna",
            paragens: "Hospital S. João, Padrão da Légua, Matosinhos, Mercado"
        }, {
            codigo: "507",
            desc: "MAR Shopping → Cordoaria",
            tipo: "diurna",
            paragens: "MAR Shopping, Cordoaria"
        }, {
            codigo: "508",
            desc: "Boavista → Cabo do Mundo (via MAR Shopping)",
            tipo: "diurna",
            paragens: "Boavista, MAR Shopping, Cabo do Mundo"
        }, {
            codigo: "1M",
            desc: "Aliados → Matosinhos (Praia)",
            tipo: "madrugada",
            paragens: "Aliados, Porto, Matosinhos, Praia"
        }, {
            codigo: "13M",
            desc: "Av. Aliados → Matosinhos (Mercado)",
            tipo: "madrugada",
            paragens: "Av. Aliados, Porto, Matosinhos, Mercado"
        }, ];

        let alertas = [
            "505, 506 | ALTERAÇÃO DE PERCURSO - OBRAS - R. DO GODINHO - MATOSINHOS",
            "505 | ALTERAÇÃO DE PERCURSO - OBRAS - ROT. AV. DO COMÉRCIO DE LEIXÕES - MATOSINHOS",
            "506 | ALTERAÇÃO DE PERCURSO - OBRAS - R. DE MOALDE - MATOSINHOS",
            "500, 502, 1M | ALTERAÇÃO DE PERCURSO - OBRAS - VIA DO CASTELO DO QUEIJO - PORTO",
            "500, 502, 506, 507, 13M | RELOCALIZAÇÃO DE PARAGEM - AV. SERPA PINTO - MATOSINHOS",
            "505 | ALTERAÇÃO DE PERCURSO - OBRAS - R. DA MAINÇA - MATOSINHOS",
            "501, 503 | ALTERAÇÃO DE PERCURSO - OBRAS - R. SÃO JOÃO DE BRITO - PORTO",
        ];

        // Render linhas
        function render() {
            const diurnas = document.getElementById("diurnas");
            const madrugada = document.getElementById("madrugada");
            diurnas.innerHTML = "";
            madrugada.innerHTML = "";
            linhas.forEach(linha => {
                const div = document.createElement("div");
                div.className = "linha";
                div.innerHTML = `
          <div class="codigo ${linha.tipo}">${linha.codigo}</div>
          <div class="desc">${linha.desc}</div>
          <div class="tipo">${linha.tipo}</div>
          <div class="tooltip">${linha.paragens}</div>
        `;
                if (linha.tipo === "diurna") diurnas.appendChild(div);
                else madrugada.appendChild(div);
            });
        }

        function filtrar() {
            const termo = document.querySelector(".search").value.toLowerCase();
            document.querySelectorAll(".linha").forEach(el => {
                const texto = el.innerText.toLowerCase();
                el.style.display = texto.includes(termo) ? "block" : "none";
            });
        }

        function atualizarAlertas() {
            const texto = alertas.join("   ✦   ");
            document.getElementById("alerts").innerText = texto;
            document.getElementById("alerts-duplicate").innerText = texto;
        }

        function atualizarLinhas() {
            render();
        }

        // Inicial
        render();
        atualizarAlertas();

        // Atualizações automáticas
        setInterval(atualizarAlertas, 30000);
        setInterval(atualizarLinhas, 60000);

        // 🗺️ Mapa Leaflet
        const map = L.map('map').setView([41.161, -8.583], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OSM'
        }).addTo(map);

        let busMarkers = {};

        async function atualizarMapa() {
            try {
                const res = await fetch("https://broker.fiware.urbanplatform.portodigital.pt/v2/entities?q=vehicleType==bus&limit=1000");
                const data = await res.json();
                data.forEach(bus => {
                    const id = bus.id;
                    const lat = parseFloat(bus.location.value.coordinates[1]);
                    const lon = parseFloat(bus.location.value.coordinates[0]);
                    const linha = bus.line || "Desconhecida";

                    if (busMarkers[id]) {
                        busMarkers[id].setLatLng([lat, lon]);
                    } else {
                        busMarkers[id] = L.circleMarker([lat, lon], {
                                radius: 6,
                                color: '#ff0000'
                            })
                            .bindPopup(`Linha: ${linha}<br>ID: ${id}`)
                            .addTo(map);
                    }
                });
            } catch (e) {
                console.error("Erro mapa:", e);
            }
        }

        atualizarMapa();
        setInterval(atualizarMapa, 15000);
    </script>
</body>

</html>
