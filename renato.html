<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renato Gonçalves</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: #e5e7eb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .card {
            background: rgba(15, 23, 42, 0.95);
            border-radius: 18px;
            padding: 28px 32px;
            box-shadow:
                0 18px 45px rgba(15, 23, 42, 0.85),
                0 0 0 1px rgba(148, 163, 184, 0.25);
            max-width: 460px;
            width: 100%;
            position: relative;
            overflow: hidden;
            animation: cardIn 0.6s ease-out forwards;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: -40%;
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 55%),
                radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.16), transparent 55%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 18px;
        }

        .avatar-wrapper {
            position: relative;
            width: 82px;
            height: 82px;
            border-radius: 999px;
            padding: 3px;
            background: conic-gradient(from 160deg, #38bdf8, #22c55e, #a855f7, #38bdf8);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: inherit;
            background: #020617;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .avatar-fallback {
            font-size: 2.1rem;
            font-weight: 700;
            color: #e5e7eb;
        }

        .name-block {
            flex: 1;
        }

        .name {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #f9fafb;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #9ca3af;
        }

        .divider {
            width: 56px;
            height: 3px;
            border-radius: 999px;
            background: linear-gradient(to right, #38bdf8, #22c55e);
            margin-bottom: 20px;
        }

        .details {
            list-style: none;
            margin-bottom: 24px;
        }

        .details li {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 0.98rem;
            color: #d1d5db;
        }

        .details-label {
            font-weight: 600;
            color: #9ca3af;
            min-width: 42px;
        }

        .note {
            font-size: 0.86rem;
            color: #9ca3af;
            margin-bottom: 18px;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.45);
            color: #e5e7eb;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.22), transparent 52%),
                        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.22), transparent 52%);
            transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .home-link:hover {
            transform: translateY(-1px);
            border-color: rgba(148, 163, 184, 0.9);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.9);
            background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.32), transparent 55%),
                        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.32), transparent 55%);
        }

        .home-link:active {
            transform: translateY(0);
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.9);
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <header class="card-header">
            <div class="avatar-wrapper">
                <div class="avatar-inner">
                    <!-- Substitui "renato.jpg" pela tua foto (mesma pasta) -->
                    <img class="avatar-img" src="renato.jpg" alt="Fotografia de Renato Gonçalves" onerror="this.style.display='none'; this.parentElement.querySelector('.avatar-fallback').style.display='flex';">
                    <div class="avatar-fallback" style="display:none;">RG</div>
                </div>
            </div>
            <div class="name-block">
                <h1 class="name">Renato Gonçalves</h1>
                <p class="subtitle">Aluno do 11ºL &bull; Nº13</p>
            </div>
        </header>
        <div class="divider"></div>
        <ul class="details">
            <li>
                <span class="details-label">Turma</span>
                <span>11ºL</span>
            </li>
            <li>
                <span class="details-label">Nº</span>
                <span>13</span>
            </li>
        </ul>
        <p class="note">
            Este cartão apresenta a informação essencial do aluno de forma simples e elegante.
        </p>
        <a class="home-link" href="index.html">Ir para a página inicial</a>
    </main>
</body>
</html>
